<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Bootstrap - 3º Semestre</title>
    

    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
</head>
<body>

<div class="container-form p-4 shadow bg-white rounded">
    <h2 class="text-center mb-4 text-primary">Cadastro de Contatos</h2>

    <form>
        <div class="mb-3">
            <label class="form-label">Nome Completo</label>
            <input type="text" class="form-control" placeholder="Ex: João Silva">
        </div>

        <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" class="form-control" placeholder="nome@email.com">
        </div>

 
        <div class="mb-3">
            <label class="form-label">Telefone</label>
            <input type="tel" class="form-control" placeholder="+55 99999-9999">
        </div>
 
        <div class="mb-3">
            <label class="form-label">Categoria</label>
            <select class="form-select">
                <option selected disabled>Escolha uma opção...</option>
                <option value="1">Pessoal</option>
                <option value="2">Trabalho</option>
                <option value="2">Familiar</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="d-block mb-2">Prioridade:</label>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="prioridade" id="baixa" value="baixa">
                <label class="form-check-label" for="baixa">Baixa</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="prioridade" id="alta" value="alta">
                <label class="form-check-label" for="alta">Alta</label>
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2">Salvar Contato</button>
    </form>
</div>

</body>
</html>
